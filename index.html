function App() {
  const [step, setStep] = useState("form");
  const [reportFrequency, setReportFrequency] = useState("weekly"); // 'weekly' | 'daily'
  const [schoolName, setSchoolName] = useState("");
  const [teacherName, setTeacherName] = useState("");
  const [gradeLevel, setGradeLevel] = useState("");
  const [className, setClassName] = useState("");
  const [studentFirstName, setStudentFirstName] = useState("");
  const [studentLastInitial, setStudentLastInitial] = useState("");
  const [weekOf, setWeekOf] = useState("");
  const [selectedPrompts, setSelectedPrompts] = useState({});
  const [customNote, setCustomNote] = useState("");
  const [gradeEstimate, setGradeEstimate] = useState("");
  const [customGrade, setCustomGrade] = useState("");
  const [openCategory, setOpenCategory] = useState(null);
  const [copied, setCopied] = useState(false);
  const [downloaded, setDownloaded] = useState(false);
  const [gdocLoading, setGdocLoading] = useState(false);
  const [gdocDone, setGdocDone] = useState(false);

  const togglePrompt = (category, prompt) => {
    setSelectedPrompts((prev) => {
      const current = prev[category] || [];
      if (current.includes(prompt)) {
        return { ...prev, [category]: current.filter((p) => p !== prompt) };
      }
      return { ...prev, [category]: [...current, prompt] };
    });
  };

  const totalSelected = Object.values(selectedPrompts).flat().length;

  const generateReport = () => {
    const lines = [];
    const lastPart = studentLastInitial.trim() ? ` ${studentLastInitial.trim().charAt(0).toUpperCase()}.` : "";
    const sName = studentFirstName.trim() ? `${studentFirstName.trim()}${lastPart}` : "your student";
    const schoolName2 = schoolName.trim() || "";
    const tName = teacherName.trim() || "Your Child's Teacher";
    const cName = className.trim() || "our class";
    const wOf = weekOf || "this week";

    const isDaily = reportFrequency === "daily";
    const periodWord = isDaily ? "today" : "this week";
    const reportTypeLabel = isDaily ? "daily progress update" : "weekly progress report";
    const dateLabel = isDaily ? "Date" : "Week of";

    lines.push(`Dear Parent/Guardian,\n`);
    lines.push(`This is a ${reportTypeLabel} to let you know how ${sName} is doing ${periodWord} in ${cName}. We value your partnership in your child's education and want to keep you informed of their progress.\n`);

    const academic     = [...(selectedPrompts["positive_academic"] || []),          ...(selectedPrompts["needs_support_academic"] || [])];
    const participation= [...(selectedPrompts["positive_participation"] || []),     ...(selectedPrompts["needs_support_participation"] || [])];
    const behavior     = [...(selectedPrompts["positive_behavior"] || []),          ...(selectedPrompts["needs_support_behavior"] || [])];
    const attendance   = [...(selectedPrompts["attendance"] || []), ...(selectedPrompts["attendance_daily"] || [])];
    const homework     = [...(selectedPrompts["positive_homework"] || []),          ...(selectedPrompts["needs_support_homework"] || [])];
    const general      = selectedPrompts["general"] || [];

    if (academic.length > 0)
      lines.push(`📚 Academically, ${sName} ${academic.join("; and ")}.\n`);
    if (participation.length > 0)
      lines.push(`🙋 In terms of class participation, ${sName} ${participation.join("; and ")}.\n`);
    if (behavior.length > 0)
      lines.push(`⭐ Regarding behavior and social-emotional growth, ${sName} ${behavior.join("; and ")}.\n`);
    if (attendance.length > 0)
      lines.push(`📅 Attendance note: ${sName} ${attendance.join("; ")}.\n`);
    if (homework.length > 0)
      lines.push(`✏️ Regarding homework and assignments, ${sName} ${homework.join("; and ")}.\n`);
    if (general.length > 0)
      lines.push(general.join(" ") + "\n");
    const gradeDisplay = gradeEstimate === "other" ? customGrade.trim() : gradeEstimate;
    if (gradeDisplay)
      lines.push(`📊 Current Grade Estimate: ${gradeDisplay}\n`);
    if (customNote.trim())
      lines.push(`Additional note: ${customNote.trim()}\n`);

    lines.push(`Thank you for your continued support. Please don't hesitate to reach out with any questions.\n`);
    lines.push(`Warm regards,\n${tName}\n${cName}${schoolName2 ? "\n" + schoolName2 : ""}${wOf ? `\nWeek of: ${wOf}` : ""}`);

    return lines.join("\n");
  };

  const report = generateReport();

  // Detect mobile
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // Which export panel is showing: null | 'email' | 'sms' | 'doc' | 'formatted'
  const [exportPanel, setExportPanel] = useState(null);
  const [parentPhone, setParentPhone] = useState("");

  const getNames = () => {
    const lastPart = studentLastInitial.trim() ? ` ${studentLastInitial.trim().charAt(0).toUpperCase()}.` : "";
    const sName = studentFirstName.trim() ? `${studentFirstName.trim()}${lastPart}` : "your student";
    const tName = teacherName.trim() || "Teacher";
    const cName = className.trim() || "Class";
    const sName2 = schoolName.trim() || "";
    const isDaily = reportFrequency === "daily";
    const wOf = weekOf
      ? new Date(weekOf + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })
      : new Date().toLocaleDateString();
    return { sName, tName, cName, wOf, isDaily };
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(report);

<strong>${periodLabel}:</strong> ${wOf}</div>
${htmlParagraphs}
<div class="footer">Generated by GradeRelay · Khali Gap Media LLC</div>
</body></html>`;

    a.href = dataUri;
    a.download = `${docTitle}.doc`;

                  <p style={{ margin: "0 0 10px 0", fontSize: 13, color: "#4c1d95", fontFamily: "'Source Serif 4', serif", lineHeight: 1.7 }}>
                    <strong>Subject:</strong> {subject}
                  </p>
                  <a
                    href={mailtoLink}
                    style={{
                      display: "inline-block", padding: "10px 22px",
                      background: "linear-gradient(135deg,#7c3aed,#6d28d9)",
                      color: "white", borderRadius: 8, textDecoration: "none",
                      fontWeight: 700, fontSize: 14, fontFamily: "'Source Serif 4', serif",
                    }}
                  >
                    📬 Open in Email App
                  </a>
                  <p style={{ margin: "10px 0 0", fontSize: 12, color: "#6d28d9", fontFamily: "'Source Serif 4', serif" }}>
                    Tap the button above to open Gmail, Mail, or your default email app with the report pre-filled.
                  </p>
                </div>
              );
            })()}

            {/* SMS Panel */}
            {exportPanel === "sms" && (() => {
              const cleanPhone = parentPhone.replace(/\D/g, "");
              const smsBody = encodeURIComponent(report.substring(0, 1600));
              const smsLink = cleanPhone
                ? `sms:${cleanPhone}${/iPhone|iPad|iPod/i.test(navigator.userAgent) ? "&" : "?"}body=${smsBody}`
                : `sms:?body=${smsBody}`;
              return (
                <div style={{ marginTop: 14, padding: 18, background: "#ecfdf5", borderRadius: 12, border: "1px solid #6ee7b7" }}>
                  <p style={{ margin: "0 0 10px 0", fontWeight: 700, fontSize: 14, color: "#065f46", fontFamily: "'Source Serif 4', serif" }}>
                    💬 Send via Text Message
                  </p>
                  <label style={{ fontSize: 13, fontWeight: 700, color: "#065f46", display: "block", marginBottom: 6 }}>
                    Parent / Guardian Phone Number (optional)
                  </label>
                  <input
                    className="input-field"
                    type="tel"
                    placeholder="e.g. 718-555-1234"
                    value={parentPhone}
                    onChange={e => setParentPhone(e.target.value)}
                    style={{ marginBottom: 12 }}
                  />
                  <a
                    href={smsLink}
                    style={{
                      display: "inline-block", padding: "10px 22px",
                      background: "linear-gradient(135deg,#059669,#047857)",
                      color: "white", borderRadius: 8, textDecoration: "none",
                      fontWeight: 700, fontSize: 14, fontFamily: "'Source Serif 4', serif",
                    }}
                  >
                    📲 Open in Messages App
                  </a>
                  <p style={{ margin: "10px 0 0", fontSize: 12, color: "#047857", fontFamily: "'Source Serif 4', serif", lineHeight: 1.6 }}>
                    Tap the button above to open your phone's Messages app with the report pre-filled.
                    {!cleanPhone && " Enter a phone number above to pre-fill the recipient."}
                    {" "}Note: Long reports may be trimmed by your carrier.
                  </p>
                </div>
              );
            })()}

            {/* Formatted Report Panel */}
            {exportPanel === "formatted" && (() => {
              const { sName, tName, cName, wOf, isDaily } = getNames();
              const reportLabel = isDaily ? "Daily Progress Update" : "Weekly Progress Report";
              const periodLabel = isDaily ? "Date" : "Week of";
              return (
                <div style={{ marginTop: 14, border: "2px solid #7c3aed", borderRadius: 12, overflow: "hidden" }}>
                  {/* Toolbar */}
                  <div style={{ background: "linear-gradient(135deg,#4c1d95,#7c3aed)", padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                    <span style={{ color: "#2dd4c8", fontWeight: 700, fontSize: 15, fontFamily: "'Source Serif 4', serif" }}>📶 GradeRelay — Formatted Report</span>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button
                        style={{ padding: "7px 14px", background: "#7c3aed", color: "white", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13 }}
                        onClick={() => {
                          const el = document.getElementById("formatted-report-body");
                          if (el) {
                            const range = document.createRange();
                            range.selectNode(el);
                            window.getSelection().removeAllRanges();
                            window.getSelection().addRange(range);
                            document.execCommand("copy");
                            window.getSelection().removeAllRanges();
                          } else {
                            navigator.clipboard.writeText(report);
                          }
                        }}
                      >📋 Select &amp; Copy</button>
                      <a
                        href="https://docs.google.com/document/create"
                        target="_blank"
                        rel="noopener noreferrer"
                        style={{ padding: "7px 14px", background: "white", color: "#3b0764", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13, textDecoration: "none" }}
                      >🗂 Open Google Drive</a>
                    </div>
                  </div>
                  {/* Hint */}
                  <div style={{ background: "#fffbeb", padding: "10px 20px", fontSize: 13, color: "#92400e", fontFamily: "'Source Serif 4', serif" }}>
                    💡 Click <strong>Select &amp; Copy</strong>, then open Google Docs and press <strong>⌘V / Ctrl+V</strong> to paste with formatting.
                  </div>
                  {/* Document body */}
                  <div style={{ background: "#f5f5f5", padding: "20px" }}>
                    <div id="formatted-report-body" style={{ maxWidth: 680, margin: "0 auto", background: "white", padding: "48px 56px", boxShadow: "0 2px 16px rgba(0,0,0,0.1)", borderRadius: 4 }}>
                      <div style={{ borderBottom: "2px solid #2dd4c8", paddingBottom: 14, marginBottom: 20 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#2dd4c8", letterSpacing: 2, fontFamily: "Arial, sans-serif", marginBottom: 4 }}>📶 GRADERELAY</div>
                        <div style={{ fontSize: 20, fontWeight: 700, color: "#3b0764", fontFamily: "Georgia, serif", marginBottom: 10 }}>{reportLabel}</div>
                        <div style={{ fontSize: 10, color: "#555", fontFamily: "Arial, sans-serif" }}>
                          <strong>Student:</strong> {sName} &nbsp;|&nbsp;
                          <strong>Teacher:</strong> {tName} &nbsp;|&nbsp;
                          <strong>Class:</strong> {cName} &nbsp;|&nbsp;
                          <strong>{periodLabel}:</strong> {wOf}
                        </div>
                      </div>
                      <div style={{ fontFamily: "Georgia, serif", fontSize: 12, lineHeight: 1.85, color: "#1a1a1a" }}>
                        {report.split("\n").map((line, i) =>
                          line.trim() === ""
                            ? <div key={i} style={{ height: 8 }} />
                            : <p key={i} style={{ margin: "0 0 8px 0" }}>{line}</p>
                        )}
                      </div>
                      <div style={{ marginTop: 24, paddingTop: 10, borderTop: "1px solid #eee", fontSize: 9, color: "#aaa", fontFamily: "Arial, sans-serif" }}>
                        Generated by GradeRelay · Khali Gap Media LLC
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Tip box */}
            <div style={{ marginTop: 14, padding: 14, background: "#f0fdf4", borderRadius: 10, border: "1px solid #bbf7d0" }}>
              <p style={{ margin: 0, fontSize: 12.5, color: "#166534", fontFamily: "'Source Serif 4', serif", lineHeight: 1.85 }}>
                <strong>📋 Copy Text</strong> — paste into ClassDojo, Remind, or Seesaw.&nbsp;
                <strong>✉️ Email</strong> — opens your email app with report pre-filled.&nbsp;
                <strong>💬 Text</strong> — opens Messages app with report pre-filled.&nbsp;
                <strong>📝 Formatted Report</strong> — view, copy &amp; paste into Google Docs.&nbsp;
                <strong>📄 Download .doc</strong> — saves a Word-compatible file.
              </p>
            </div>



            <div style={{ marginTop: 12, padding: 14, background: "#f0fdf4", borderRadius: 10, border: "1px solid #bbf7d0" }}>
              <p style={{ margin: 0, fontSize: 12.5, color: "#166534", fontFamily: "'Source Serif 4', serif", lineHeight: 1.75 }}>
                <strong>📋 Copy Text</strong> — paste into email, ClassDojo, Remind, or Seesaw. &nbsp;
                <strong>📝 Open Report</strong> — opens a formatted, printable report page with one-click copy &amp; Google Drive button. &nbsp;
                <strong>📄 Download .doc</strong> — saves a Word file to your computer.
              </p>
            </div>

            <div style={{ textAlign: "center", marginTop: 24 }}>
              <button className="primary-btn" onClick={() => {
                setStudentFirstName(""); setStudentLastInitial(""); setSelectedPrompts({}); setCustomNote(""); setReportFrequency("weekly"); setStep("form");
              }}>
                + New Report for Another Student
              </button>
            </div>
          </div>
        )}

        <p style={{ textAlign: "center", color: "#64748b", fontSize: 12, marginTop: 20, fontFamily: "'Source Serif 4', serif", lineHeight: 2 }}>
          📶 GradeRelay · Connecting Teachers & Families · {new Date().getFullYear()}
          <br />
          <a href="mailto:support@graderelay.com" style={{ color: "#2dd4c8", textDecoration: "none", fontWeight: 600 }}>
            support@graderelay.com
          </a>
        </p>
      </div>
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>

  <!-- PWA Install Prompt -->
  <script>
    let deferredPrompt;
    const installBanner = document.createElement('div');
    installBanner.id = 'install-banner';
    installBanner.innerHTML = `
      <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#2d1b69,#4c1d95);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);font-family:sans-serif;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:24px;">📶</span>
          <div>
            <div style="font-weight:700;font-size:14px;">Install GradeRelay</div>
            <div style="font-size:12px;color:#94a3b8;">Add to your home screen for quick access</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button id="install-btn" style="background:linear-gradient(135deg,#2dd4c8,#06b6d4);color:white;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;">Install</button>
          <button id="dismiss-btn" style="background:transparent;color:#94a3b8;border:1px solid #334155;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;">Not now</button>
        </div>
      </div>`;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.body.appendChild(installBanner);
      document.getElementById('install-btn').addEventListener('click', async () => {
        installBanner.remove();
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
      });
      document.getElementById('dismiss-btn').addEventListener('click', () => {
        installBanner.remove();
      });
    });

    // iOS "Add to Home Screen" tip — shows once
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
    if (isIos && !isStandalone && !localStorage.getItem('iosTipDismissed')) {
      const iosBanner = document.createElement('div');
      iosBanner.innerHTML = `
        <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#2d1b69,#4c1d95);color:white;padding:14px 20px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);font-family:sans-serif;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <span style="font-weight:700;font-size:14px;">📶 Install GradeRelay on iPhone</span>
            <button onclick="this.closest('div').parentElement.remove();localStorage.setItem('iosTipDismissed','1')" style="background:transparent;border:none;color:#94a3b8;font-size:18px;cursor:pointer;line-height:1;">×</button>
          </div>
          <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.6;">Tap the <strong style="color:white;">Share button</strong> (□↑) at the bottom of Safari, then tap <strong style="color:white;">"Add to Home Screen"</strong> to install GradeRelay as an app.</p>
        </div>`;
      setTimeout(() => document.body.appendChild(iosBanner), 3000);
    }

    // Register Service Worker for offline use
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'graderelay-v1';
        const ASSETS = ['/'];
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
