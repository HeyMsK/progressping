export default function App() {
  const [step, setStep] = useState("form");
  const [reportFrequency, setReportFrequency] = useState("weekly"); // 'weekly' | 'daily'
  const [teacherName, setTeacherName] = useState("");
  const [className, setClassName] = useState("");
  const [studentFirstName, setStudentFirstName] = useState("");
  const [studentLastInitial, setStudentLastInitial] = useState("");
  const [weekOf, setWeekOf] = useState("");
  const [selectedPrompts, setSelectedPrompts] = useState({});
  const [customNote, setCustomNote] = useState("");
  const [openCategory, setOpenCategory] = useState(null);
  const [copied, setCopied] = useState(false);
  const [downloaded, setDownloaded] = useState(false);
  const [gdocLoading, setGdocLoading] = useState(false);
  const [gdocDone, setGdocDone] = useState(false);

  const togglePrompt = (category, prompt) => {
    setSelectedPrompts((prev) => {
      const current = prev[category] || [];
      if (current.includes(prompt)) {
        return { ...prev, [category]: current.filter((p) => p !== prompt) };
      }
      return { ...prev, [category]: [...current, prompt] };
    });
  };

  const totalSelected = Object.values(selectedPrompts).flat().length;

  const generateReport = () => {
    const lines = [];
    const lastPart = studentLastInitial.trim() ? ` ${studentLastInitial.trim().charAt(0).toUpperCase()}.` : "";
    const sName = studentFirstName.trim() ? `${studentFirstName.trim()}${lastPart}` : "your student";
    const tName = teacherName.trim() || "Your Child's Teacher";
    const cName = className.trim() || "our class";
    const wOf = weekOf || "this week";

    const isDaily = reportFrequency === "daily";
    const periodWord = isDaily ? "today" : "this week";
    const reportTypeLabel = isDaily ? "daily progress update" : "weekly progress report";
    const dateLabel = isDaily ? "Date" : "Week of";

    lines.push(`Dear Parent/Guardian,\n`);
    lines.push(`This is a ${reportTypeLabel} to let you know how ${sName} is doing ${periodWord} in ${cName}. We value your partnership in your child's education and want to keep you informed of their progress.\n`);

    const academic     = [...(selectedPrompts["positive_academic"] || []),          ...(selectedPrompts["needs_support_academic"] || [])];
    const participation= [...(selectedPrompts["positive_participation"] || []),     ...(selectedPrompts["needs_support_participation"] || [])];
    const behavior     = [...(selectedPrompts["positive_behavior"] || []),          ...(selectedPrompts["needs_support_behavior"] || [])];
    const attendance   = [...(selectedPrompts["attendance"] || []), ...(selectedPrompts["attendance_daily"] || [])];
    const homework     = [...(selectedPrompts["positive_homework"] || []),          ...(selectedPrompts["needs_support_homework"] || [])];
    const general      = selectedPrompts["general"] || [];

    if (academic.length > 0)
      lines.push(`📚 Academically, ${sName} ${academic.join("; and ")}.\n`);
    if (participation.length > 0)
      lines.push(`🙋 In terms of class participation, ${sName} ${participation.join("; and ")}.\n`);
    if (behavior.length > 0)
      lines.push(`⭐ Regarding behavior and social-emotional growth, ${sName} ${behavior.join("; and ")}.\n`);
    if (attendance.length > 0)
      lines.push(`📅 Attendance note: ${sName} ${attendance.join("; ")}.\n`);
    if (homework.length > 0)
      lines.push(`✏️ Regarding homework and assignments, ${sName} ${homework.join("; and ")}.\n`);
    if (general.length > 0)
      lines.push(general.join(" ") + "\n");
    if (customNote.trim())
      lines.push(`Additional note: ${customNote.trim()}\n`);

    lines.push(`Thank you for your continued support. Please don't hesitate to reach out with any questions.\n`);
    lines.push(`Warm regards,\n${tName}\n${cName}${wOf ? `\nWeek of: ${wOf}` : ""}`);

    return lines.join("\n");
  };

  const report = generateReport();

  // Detect mobile
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // Which export panel is showing: null | 'email' | 'doc' | 'formatted'
  const [exportPanel, setExportPanel] = useState(null);

  const getNames = () => {
    const lastPart = studentLastInitial.trim() ? ` ${studentLastInitial.trim().charAt(0).toUpperCase()}.` : "";
    const sName = studentFirstName.trim() ? `${studentFirstName.trim()}${lastPart}` : "your student";
    const tName = teacherName.trim() || "Teacher";
    const cName = className.trim() || "Class";
    const isDaily = reportFrequency === "daily";
    const wOf = weekOf
      ? new Date(weekOf + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })
      : new Date().toLocaleDateString();
    return { sName, tName, cName, wOf, isDaily };
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(report);
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  };

  // EMAIL: builds mailto link and shows it as a tappable link (works in all envs)
  const handleEmailShare = () => {
    setExportPanel(exportPanel === "email" ? null : "email");
  };

  // FORMATTED REPORT: renders inline below the buttons (no popup needed)
  const handleOpenInGoogleDocs = () => {
    setExportPanel(exportPanel === "formatted" ? null : "formatted");
    setGdocDone(true);
    setTimeout(() => setGdocDone(false), 3000);
  };

  // DOWNLOAD DOC: uses data: URI which works everywhere including iframes
  const handleDownloadDoc = () => {
    const { sName, tName, cName, wOf, isDaily } = getNames();
    const reportLabel = isDaily ? "Daily Progress Update" : "Weekly Progress Report";
    const periodLabel = isDaily ? "Date" : "Week of";
    const docTitle = isDaily
      ? `ProgressPing – ${sName} – ${wOf}`
      : `ProgressPing – ${sName} – Week of ${wOf}`;

    const htmlParagraphs = report
      .split("\n")
      .map(line => {
        const escaped = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return escaped.trim() === ""
          ? `<p style="margin:0 0 6pt 0">&nbsp;</p>`
          : `<p style="margin:0 0 9pt 0;font-family:Georgia,serif;font-size:12pt;line-height:1.85">${escaped}</p>`;
      })
      .join("\n");

    const docHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">
<head><meta charset="utf-8"><title>${docTitle}</title>
<style>@page{margin:1in}body{font-family:Georgia,serif;font-size:12pt;color:#1a1a1a}
h1{font-size:18pt;color:#203a43;margin-bottom:6pt}
.meta{font-size:10pt;color:#555;border-bottom:2pt solid #38bdf8;padding-bottom:8pt;margin-bottom:18pt}
.footer{font-size:9pt;color:#aaa;border-top:1pt solid #eee;margin-top:24pt;padding-top:8pt}</style>
</head><body>
<h1>ProgressPing — ${reportLabel}</h1>
<div class="meta"><strong>Student:</strong> ${sName} &nbsp;&nbsp;
<strong>Teacher:</strong> ${tName} &nbsp;&nbsp;
<strong>Class:</strong> ${cName} &nbsp;&nbsp;
<strong>${periodLabel}:</strong> ${wOf}</div>
${htmlParagraphs}
<div class="footer">Generated by ProgressPing · Khali Gap Media LLC</div>
</body></html>`;

    // data: URI works in all environments including sandboxed iframes
    const dataUri = "data:application/msword;charset=utf-8," + encodeURIComponent(docHTML);
    const a = document.createElement("a");
    a.href = dataUri;
    a.download = `${docTitle}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    setDownloaded(true);
    setTimeout(() => setDownloaded(false), 3000);
  };


  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)",
      fontFamily: "'Georgia', 'Times New Roman', serif",
      padding: "24px 16px",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&display=swap');
        * { box-sizing: border-box; }
        .card { background: #ffffff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .input-field {
          width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb;
          border-radius: 8px; font-size: 15px; font-family: 'Source Serif 4', serif;
          transition: border-color 0.2s; outline: none; color: #1f2937;
        }
        .input-field:focus { border-color: #2c5364; }
        .prompt-btn {
          display: block; width: 100%; text-align: left;
          padding: 8px 12px; margin: 4px 0;
          border: 2px solid transparent; border-radius: 8px;
          cursor: pointer; font-size: 13.5px; font-family: 'Source Serif 4', serif;
          transition: all 0.15s; background: #f9fafb; color: #374151;
        }
        .prompt-btn:hover { border-color: #9ca3af; background: #f3f4f6; }
        .prompt-btn.selected { border-color: #2c5364; background: #dbeafe; color: #1e3a5f; font-weight: 600; }
        .cat-header {
          width: 100%; text-align: left; padding: 12px 16px;
          border: none; border-radius: 10px; cursor: pointer;
          font-size: 14px; font-weight: 700; font-family: 'Source Serif 4', serif;
          display: flex; justify-content: space-between; align-items: center;
          transition: opacity 0.2s;
        }
        .cat-header:hover { opacity: 0.85; }
        .primary-btn {
          padding: 14px 32px; border: none; border-radius: 10px;
          background: linear-gradient(135deg, #203a43, #2c5364);
          color: white; font-size: 16px; font-weight: 700;
          font-family: 'Playfair Display', serif; cursor: pointer;
          box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: transform 0.15s, box-shadow 0.15s;
          letter-spacing: 0.5px;
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.35); }
        .secondary-btn {
          padding: 12px 24px; border: 2px solid #374151; border-radius: 10px;
          background: white; color: #374151; font-size: 15px; font-weight: 600;
          font-family: 'Source Serif 4', serif; cursor: pointer; transition: all 0.15s;
        }
        .secondary-btn:hover { background: #f3f4f6; }
        .report-box {
          background: #fafafa; border: 1px solid #e5e7eb; border-radius: 12px;
          padding: 28px; font-family: 'Source Serif 4', serif; font-size: 15px;
          line-height: 1.85; color: #1f2937; white-space: pre-wrap;

          font-size: 12px; font-weight: 700; font-family: 'Source Serif 4', serif;

          padding: 13px 20px; border: none; border-radius: 10px;
          color: white; font-size: 14px; font-weight: 700;
          font-family: 'Source Serif 4', serif; cursor: pointer;
          transition: transform 0.15s, box-shadow 0.15s;
          box-shadow: 0 3px 12px rgba(0,0,0,0.25); flex: 1 1 auto;
        }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.3); }
      `}</style>

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: "28px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 6 }}>
          <div style={{
            width: 48, height: 48, borderRadius: "14px",
            background: "linear-gradient(135deg, #38bdf8, #0ea5e9)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 24, boxShadow: "0 4px 20px rgba(56,189,248,0.4)"
          }}>📡</div>
          <h1 style={{
            fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px, 5vw, 46px)",
            color: "#ffffff", margin: 0, letterSpacing: "-1px",
            textShadow: "0 2px 20px rgba(0,0,0,0.4)",
          }}>
            Progress<span style={{ color: "#38bdf8" }}>Ping</span>
          </h1>
        </div>
        <p style={{ color: "#94a3b8", marginTop: 4, fontSize: 15, fontFamily: "'Source Serif 4', serif", letterSpacing: "0.5px" }}>
          Daily & Weekly Parent Communication · Built for Teachers
        </p>
      </div>

      <div style={{ maxWidth: 780, margin: "0 auto" }}>

        {step === "form" && (
          <div className="card" style={{ padding: "clamp(20px, 5vw, 40px)" }}>

            <section style={{ marginBottom: 32 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
                <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, color: "#1f2937", margin: 0 }}>
                  Student & Class Info
                </h2>
                {/* Daily / Weekly Toggle */}
                <div style={{ display: "flex", background: "#f3f4f6", borderRadius: 10, padding: 4, gap: 4 }}>
                  {["daily", "weekly"].map(freq => (
                    <button
                      key={freq}
                      onClick={() => setReportFrequency(freq)}
                      style={{
                        padding: "8px 20px", border: "none", borderRadius: 8, cursor: "pointer",
                        fontFamily: "'Source Serif 4', serif", fontSize: 13, fontWeight: 700,
                        transition: "all 0.2s",
                        background: reportFrequency === freq ? "linear-gradient(135deg, #203a43, #2c5364)" : "transparent",
                        color: reportFrequency === freq ? "white" : "#6b7280",
                        boxShadow: reportFrequency === freq ? "0 2px 8px rgba(0,0,0,0.2)" : "none",
                      }}
                    >
                      {freq === "daily" ? "📅 Daily" : "📆 Weekly"}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div style={{ display: "flex", gap: 8, gridColumn: "1 / -1" }}>
                  <div style={{ flex: 2 }}>
                    <label style={{ fontSize: 13, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 4 }}>
                      STUDENT FIRST NAME <span style={{ color: "#9ca3af", fontWeight: 400 }}>— first name only for privacy</span>
                    </label>
                    <input className="input-field" placeholder="e.g. Jordan" value={studentFirstName} onChange={e => setStudentFirstName(e.target.value)} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 13, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 4 }}>
                      LAST INITIAL
                    </label>
                    <input
                      className="input-field"
                      placeholder="e.g. S"
                      maxLength={1}
                      value={studentLastInitial}
                      onChange={e => setStudentLastInitial(e.target.value.replace(/[^a-zA-Z]/g, ""))}
                      style={{ textTransform: "uppercase" }}
                    />
                  </div>
                </div>
                <div style={{ gridColumn: "1 / -1", background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, padding: "8px 12px", fontSize: 12.5, color: "#1e40af" }}>
                  🔒 <strong>Privacy tip:</strong> ProgressPing only uses first name + last initial (e.g. "Jordan S.") to protect student identity in compliance with FERPA guidelines.
                </div>
                <div>
                  <label style={{ fontSize: 13, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 4 }}>TEACHER NAME</label>
                  <input className="input-field" placeholder="e.g. Ms. Johnson" value={teacherName} onChange={e => setTeacherName(e.target.value)} />
                </div>
                <div>
                  <label style={{ fontSize: 13, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 4 }}>CLASS / SUBJECT</label>
                  <select
                    className="input-field"
                    value={className}
                    onChange={e => setClassName(e.target.value)}
                    style={{ cursor: "pointer", appearance: "auto" }}
                  >
                    <option value="">— Select a subject —</option>
                    {Object.entries(SUBJECTS).map(([group, options]) => (
                      <optgroup key={group} label={group}>
                        {options.map(opt => (
                          <option key={opt} value={opt}>{opt}</option>
                        ))}
                      </optgroup>
                    ))}
                    <option value="__custom__">✏️ Other / Type my own...</option>
                  </select>
                  {className === "__custom__" && (
                    <input
                      className="input-field"
                      placeholder="Type your class or subject name..."
                      style={{ marginTop: 8 }}
                      onChange={e => setClassName(e.target.value)}
                      autoFocus
                    />
                  )}
                </div>
                <div>
                  <label style={{ fontSize: 13, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 4 }}>{reportFrequency === "daily" ? "DATE" : "WEEK OF"}</label>
                  <input className="input-field" type="date" value={weekOf} onChange={e => setWeekOf(e.target.value)} />
                </div>
              </div>
            </section>

            <hr style={{ border: "none", borderTop: "1px solid #e5e7eb", marginBottom: 28 }} />

            <section style={{ marginBottom: 28 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, color: "#1f2937", margin: 0 }}>
                  Choose Feedback Prompts
                </h2>
                {totalSelected > 0 && (
                  <span className="badge" style={{ background: "#dbeafe", color: "#1e3a5f" }}>
                    {totalSelected} selected
                  </span>
                )}
              </div>
              <p style={{ color: "#6b7280", fontSize: 14, marginTop: -8, marginBottom: 16 }}>
                Click any category to expand it, then select all prompts that apply to this student.
              </p>

              {Object.entries(CATEGORY_META).filter(([key, meta]) => {

                if (meta.dailyOnly && reportFrequency === "weekly") return false;
                return true;
              }).map(([key, meta]) => {
                const isOpen = openCategory === key;
                const selected = selectedPrompts[key] || [];
                return (
                  <div key={key} style={{ marginBottom: 8 }}>
                    <button
                      className="cat-header"
                      style={{ background: meta.bg, color: meta.color }}
                      onClick={() => setOpenCategory(isOpen ? null : key)}
                    >
                      <span>
                        {meta.label}
                        {selected.length > 0 && (
                          <span className="badge" style={{ background: meta.color, color: "white", marginLeft: 8 }}>
                            {selected.length}
                          </span>
                        )}
                      </span>
                      <span style={{ fontSize: 18 }}>{isOpen ? "▲" : "▼"}</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: "8px 4px 4px", background: "#fafafa", borderRadius: "0 0 10px 10px", border: "1px solid #e5e7eb", borderTop: "none" }}>
                        {PROMPTS[key].map((prompt) => (
                          <button
                            key={prompt}
                            className={`prompt-btn ${selected.includes(prompt) ? "selected" : ""}`}
                            onClick={() => togglePrompt(key, prompt)}
                          >
                            {selected.includes(prompt) ? "✓ " : "○ "}{prompt}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </section>

            <section style={{ marginBottom: 28 }}>
              <label style={{ fontSize: 13, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 6 }}>
                ADDITIONAL PERSONAL NOTE (optional)
              </label>
              <textarea
                className="input-field"
                rows={3}
                placeholder="Add any personal notes, upcoming events, or specific feedback..."
                value={customNote}
                onChange={e => setCustomNote(e.target.value)}
                style={{ resize: "vertical" }}
              />
            </section>

            <div style={{ textAlign: "center" }}>
              <button className="primary-btn" onClick={() => setStep("preview")}>
                Generate Progress Report →
              </button>
            </div>
          </div>
        )}

        {step === "preview" && (
          <div className="card" style={{ padding: "clamp(20px, 5vw, 40px)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
              <div>
                <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, color: "#1f2937", margin: 0 }}>
                  {reportFrequency === "daily" ? "Daily Update" : "Weekly Report"} Preview
                  <span style={{ marginLeft: 10, fontSize: 13, fontWeight: 700, padding: "3px 10px", borderRadius: 99, background: reportFrequency === "daily" ? "#dbeafe" : "#d8f3dc", color: reportFrequency === "daily" ? "#1e3a5f" : "#2d6a4f", verticalAlign: "middle" }}>
                    {reportFrequency === "daily" ? "📅 Daily" : "📆 Weekly"}
                  </span>
                </h2>
                {studentFirstName && (
                  <p style={{ color: "#6b7280", margin: "4px 0 0", fontSize: 14 }}>
                    For: <strong>{studentFirstName}{studentLastInitial ? ` ${studentLastInitial.trim().charAt(0).toUpperCase()}.` : ""}</strong>{weekOf && ` · Week of ${weekOf}`}
                  </p>
                )}
              </div>
              <button className="secondary-btn" onClick={() => setStep("form")}>← Edit</button>
            </div>

            <div className="report-box">{report}</div>

{/* Action buttons */}
            <div style={{ marginTop: 20, display: "flex", gap: 10, flexWrap: "wrap" }}>
              <button
                className="action-btn"
                style={{ background: copied ? "linear-gradient(135deg,#14532d,#16a34a)" : "linear-gradient(135deg,#1e3a5f,#2563eb)" }}
                onClick={handleCopy}
              >
                {copied ? "✓ Copied!" : "📋 Copy Text"}
              </button>
              <button
                className="action-btn"
                style={{ background: exportPanel === "email" ? "linear-gradient(135deg,#5b21b6,#7c3aed)" : "linear-gradient(135deg,#7c3aed,#6d28d9)" }}
                onClick={handleEmailShare}
              >
                ✉️ {exportPanel === "email" ? "Hide Email" : "Send via Email"}
              </button>
              <button
                className="action-btn"
                style={{ background: exportPanel === "formatted" ? "linear-gradient(135deg,#14532d,#16a34a)" : "linear-gradient(135deg,#1e6b3a,#16a34a)" }}
                onClick={handleOpenInGoogleDocs}
              >
                📝 {exportPanel === "formatted" ? "Hide Report" : "View Formatted Report"}
              </button>
              <button
                className="action-btn"
                style={{ background: downloaded ? "linear-gradient(135deg,#14532d,#16a34a)" : "linear-gradient(135deg,#1a5276,#1f618d)" }}
                onClick={handleDownloadDoc}
              >
                {downloaded ? "✓ Downloading!" : "📄 Download .doc"}
              </button>
            </div>

            {/* Email Panel */}
            {exportPanel === "email" && (() => {
              const { sName, cName, wOf, isDaily } = getNames();
              const subject = isDaily
                ? `Daily Progress Update – ${sName} – ${cName} – ${wOf}`
                : `Weekly Progress Report – ${sName} – ${cName} – Week of ${wOf}`;
              const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(report)}`;
              return (
                <div style={{ marginTop: 14, padding: 18, background: "#f5f3ff", borderRadius: 12, border: "1px solid #ddd6fe" }}>
                  <p style={{ margin: "0 0 10px 0", fontWeight: 700, fontSize: 14, color: "#5b21b6", fontFamily: "'Source Serif 4', serif" }}>
                    ✉️ Send via Email
                  </p>
                  <p style={{ margin: "0 0 10px 0", fontSize: 13, color: "#4c1d95", fontFamily: "'Source Serif 4', serif", lineHeight: 1.7 }}>
                    <strong>Subject:</strong> {subject}
                  </p>
                  <a
                    href={mailtoLink}
                    style={{
                      display: "inline-block", padding: "10px 22px",
                      background: "linear-gradient(135deg,#7c3aed,#6d28d9)",
                      color: "white", borderRadius: 8, textDecoration: "none",
                      fontWeight: 700, fontSize: 14, fontFamily: "'Source Serif 4', serif",
                    }}
                  >
                    📬 Open in Email App
                  </a>
                  <p style={{ margin: "10px 0 0", fontSize: 12, color: "#6d28d9", fontFamily: "'Source Serif 4', serif" }}>
                    Tap the button above to open Gmail, Mail, or your default email app with the report pre-filled.
                  </p>
                </div>
              );
            })()}

            {/* Formatted Report Panel */}
            {exportPanel === "formatted" && (() => {
              const { sName, tName, cName, wOf, isDaily } = getNames();
              const reportLabel = isDaily ? "Daily Progress Update" : "Weekly Progress Report";
              const periodLabel = isDaily ? "Date" : "Week of";
              return (
                <div style={{ marginTop: 14, border: "2px solid #38bdf8", borderRadius: 12, overflow: "hidden" }}>
                  {/* Toolbar */}
                  <div style={{ background: "#203a43", padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                    <span style={{ color: "#38bdf8", fontWeight: 700, fontSize: 15, fontFamily: "'Source Serif 4', serif" }}>📡 ProgressPing — Formatted Report</span>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button
                        style={{ padding: "7px 14px", background: "#2563eb", color: "white", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13 }}
                        onClick={() => {
                          const el = document.getElementById("formatted-report-body");
                          if (el) {
                            const range = document.createRange();
                            range.selectNode(el);
                            window.getSelection().removeAllRanges();
                            window.getSelection().addRange(range);
                            document.execCommand("copy");
                            window.getSelection().removeAllRanges();
                          } else {
                            navigator.clipboard.writeText(report);
                          }
                        }}
                      >📋 Select &amp; Copy</button>
                      <a
                        href="https://docs.google.com/document/create"
                        target="_blank"
                        rel="noopener noreferrer"
                        style={{ padding: "7px 14px", background: "white", color: "#203a43", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13, textDecoration: "none" }}
                      >🗂 Open Google Drive</a>
                    </div>
                  </div>
                  {/* Hint */}
                  <div style={{ background: "#fffbeb", padding: "10px 20px", fontSize: 13, color: "#92400e", fontFamily: "'Source Serif 4', serif" }}>
                    💡 Click <strong>Select &amp; Copy</strong>, then open Google Docs and press <strong>⌘V / Ctrl+V</strong> to paste with formatting.
                  </div>
                  {/* Document body */}
                  <div style={{ background: "#f5f5f5", padding: "20px" }}>
                    <div id="formatted-report-body" style={{ maxWidth: 680, margin: "0 auto", background: "white", padding: "48px 56px", boxShadow: "0 2px 16px rgba(0,0,0,0.1)", borderRadius: 4 }}>
                      <div style={{ borderBottom: "2px solid #38bdf8", paddingBottom: 14, marginBottom: 20 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#38bdf8", letterSpacing: 2, fontFamily: "Arial, sans-serif", marginBottom: 4 }}>📡 PROGRESSPING</div>
                        <div style={{ fontSize: 20, fontWeight: 700, color: "#203a43", fontFamily: "Georgia, serif", marginBottom: 10 }}>{reportLabel}</div>
                        <div style={{ fontSize: 10, color: "#555", fontFamily: "Arial, sans-serif" }}>
                          <strong>Student:</strong> {sName} &nbsp;|&nbsp;
                          <strong>Teacher:</strong> {tName} &nbsp;|&nbsp;
                          <strong>Class:</strong> {cName} &nbsp;|&nbsp;
                          <strong>{periodLabel}:</strong> {wOf}
                        </div>
                      </div>
                      <div style={{ fontFamily: "Georgia, serif", fontSize: 12, lineHeight: 1.85, color: "#1a1a1a" }}>
                        {report.split("\n").map((line, i) =>
                          line.trim() === ""
                            ? <div key={i} style={{ height: 8 }} />
                            : <p key={i} style={{ margin: "0 0 8px 0" }}>{line}</p>
                        )}
                      </div>
                      <div style={{ marginTop: 24, paddingTop: 10, borderTop: "1px solid #eee", fontSize: 9, color: "#aaa", fontFamily: "Arial, sans-serif" }}>
                        Generated by ProgressPing · Khali Gap Media LLC
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Tip box */}
            <div style={{ marginTop: 14, padding: 14, background: "#f0fdf4", borderRadius: 10, border: "1px solid #bbf7d0" }}>
              <p style={{ margin: 0, fontSize: 12.5, color: "#166534", fontFamily: "'Source Serif 4', serif", lineHeight: 1.85 }}>
                <strong>📋 Copy Text</strong> — paste into ClassDojo, Remind, or Seesaw.&nbsp;
                <strong>✉️ Email</strong> — opens your email app with report pre-filled.&nbsp;
                <strong>📝 Formatted Report</strong> — view, copy &amp; paste into Google Docs.&nbsp;
                <strong>📄 Download .doc</strong> — saves a Word-compatible file.
              </p>
            </div>



            <div style={{ marginTop: 12, padding: 14, background: "#f0fdf4", borderRadius: 10, border: "1px solid #bbf7d0" }}>
              <p style={{ margin: 0, fontSize: 12.5, color: "#166534", fontFamily: "'Source Serif 4', serif", lineHeight: 1.75 }}>
                <strong>📋 Copy Text</strong> — paste into email, ClassDojo, Remind, or Seesaw. &nbsp;
                <strong>📝 Open Report</strong> — opens a formatted, printable report page with one-click copy &amp; Google Drive button. &nbsp;
                <strong>📄 Download .doc</strong> — saves a Word file to your computer.
              </p>
            </div>

            <div style={{ textAlign: "center", marginTop: 24 }}>
              <button className="primary-btn" onClick={() => {
                setStudentFirstName(""); setStudentLastInitial(""); setSelectedPrompts({}); setCustomNote(""); setReportFrequency("weekly"); setStep("form");
              }}>
                + New Report for Another Student
              </button>
            </div>
          </div>
        )}

        <p style={{ textAlign: "center", color: "#64748b", fontSize: 12, marginTop: 20, fontFamily: "'Source Serif 4', serif" }}>
          📡 ProgressPing · Weekly Reports Made Easy · {new Date().getFullYear()}
        </p>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
