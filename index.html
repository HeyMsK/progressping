function App() {

      return { ...prev, [category]: [...current, prompt] };
    });
  };

  const totalSelected = Object.values(selectedPrompts).flat().length;



  const generateReport = () => {
    const lines = [];
    // sName: first use says "your child, ___" — rest just say "___"
    const blank = "_______________";
    const sNameFirst = nameBlank ? `your child, ${blank},` : "your child";
    const sName = nameBlank ? blank : "your child";
    const schoolName2 = schoolName.trim() || "";
    const tName = teacherName.trim() || "Your Child's Teacher";
    const cName = className.trim() || "";
    const wOf = weekOf || "this week";

    const isDaily = reportFrequency === "daily";
    const isMarkingPeriod = reportFrequency === "marking_period";
    const periodWord = isDaily ? "today" : isMarkingPeriod ? "this marking period" : "this week";
    const reportTypeLabel = isDaily ? "daily progress update" : isMarkingPeriod ? "marking period progress report" : "weekly progress report";

    const T = TRANSLATIONS[reportLang] || TRANSLATIONS.en;
    lines.push(`${T.greeting}\n`);
    const introType = isDaily ? T.intro_daily : isMarkingPeriod ? T.intro_mp : T.intro_weekly;
    const introPeriodWord = isDaily ? "today" : isMarkingPeriod ? "this marking period" : "this week";
    const introMid = T.intro_mid.replace("this week", introPeriodWord);
    lines.push(`${introType} ${sNameFirst} ${introMid}${cName ? " " + cName : " this class"}${T.intro_end ? " " + T.intro_end : ""}. ${T.intro_tail}\n`);

    const academic     = [...(selectedPrompts["positive_academic"] || []),          ...(selectedPrompts["needs_support_academic"] || [])];
    const participation= [...(selectedPrompts["positive_participation"] || []),     ...(selectedPrompts["needs_support_participation"] || [])];
    const behavior     = [...(selectedPrompts["positive_behavior"] || []),          ...(selectedPrompts["needs_support_behavior"] || [])];
    const attendance   = [...(selectedPrompts["attendance"] || []), ...(selectedPrompts["attendance_daily"] || [])];
    const homework     = [...(selectedPrompts["positive_homework"] || []),          ...(selectedPrompts["needs_support_homework"] || [])];
    const general_mp   = selectedPrompts["general_mp"] || [];
    const general      = selectedPrompts["general"] || [];

    if (selectedSubjectPrompts.length > 0) {
      const subjLabel = activeSubject ? activeSubject.replace(/^[^\w]+/, "").trim() : "";
      const subjPrefix = subjLabel ? `In ${subjLabel}, ` : "";
      lines.push(`${subjPrefix}${sName} ${selectedSubjectPrompts.join("; and ")}.\n`);
    }
    if (academic.length > 0)
      lines.push(`📚 ${T.academic} ${sName} ${academic.join("; and ")}.\n`);
    if (participation.length > 0)
      lines.push(`🙋 ${T.participation} ${sName} ${participation.join("; and ")}.\n`);
    if (behavior.length > 0)
      lines.push(`⭐ ${T.behavior} ${sName} ${behavior.join("; and ")}.\n`);
    if (attendance.length > 0)
      lines.push(`📅 ${T.attendance} ${sName} ${attendance.join("; ")}.\n`);
    if (homework.length > 0)
      lines.push(`✏️ ${T.homework} ${sName} ${homework.join("; and ")}.\n`);
    if (general_mp.length > 0)
      lines.push(general_mp.join(" ") + "\n");
    if (general.length > 0)
      lines.push(general.join(" ") + "\n");
    const gradeDisplay = gradeEstimate === "other" ? customGrade.trim() : gradeEstimate;
    if (gradeDisplay)
      lines.push(`📊 ${T.grade_est} ${gradeDisplay}\n`);
    if (customNote.trim())
      lines.push(`${T.add_note} ${customNote.trim()}\n`);

    lines.push(`${T.closing}\n`);

      ? (["Mid-Year","End of Year"].includes(termType) ? termType : termType === "Custom" ? weekOf : `${termType}${weekOf ? " " + weekOf : ""}`)

  // DOWNLOAD DOC: uses data: URI which works everywhere including iframes
  const handleDownloadDoc = () => {
    const { sName, tName, cName, wOf, isDaily } = getNames();
    const isMarkingPeriod = reportFrequency === "marking_period";
    const termLabel = isMarkingPeriod
      ? (["Mid-Year","End of Year"].includes(termType) ? termType : termType === "Custom" ? weekOf : `${termType}${weekOf ? " " + weekOf : ""}`)
      : wOf;
    const reportLabel = isDaily ? "Daily Progress Update" : isMarkingPeriod ? "Marking Period Progress Report" : "Weekly Progress Report";
    const periodLabel = isMarkingPeriod ? "Term" : isDaily ? "Date" : "Week of";
    const docTitle = isMarkingPeriod
      ? `GradeRelay – ${termLabel} – Progress Report`
      : isDaily
        ? `GradeRelay – Progress Report – ${wOf}`
        : `GradeRelay – Progress Report – Week of ${wOf}`;

    const htmlParagraphs = (editedReport || report)
      .split("\n")
      .map(line => {
        const escaped = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return escaped.trim() === ""
          ? `<p style="margin:0 0 6pt 0">&nbsp;</p>`
          : `<p style="margin:0 0 9pt 0;font-family:Georgia,serif;font-size:12pt;line-height:1.85">${escaped}</p>`;
      })
      .join("\n");

    const docHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">
<head><meta charset="utf-8"><title>${docTitle}</title>
<style>@page{margin:1in}body{font-family:Georgia,serif;font-size:12pt;color:#1a1a1a}
h1{font-size:18pt;color:#4c1d95;margin-bottom:6pt}
.meta{font-size:10pt;color:#555;border-bottom:2pt solid #7c3aed;padding-bottom:8pt;margin-bottom:18pt}

<strong>${periodLabel}:</strong> ${termLabel}</div>
${htmlParagraphs}
<div class="footer">Generated by GradeRelay · Khali Gap Media LLC</div>
</body></html>`;

    // data: URI works in all environments including sandboxed iframes
    const dataUri = "data:application/msword;charset=utf-8," + encodeURIComponent(docHTML);
    const a = document.createElement("a");
    a.href = dataUri;
    a.download = `${docTitle}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    setDownloaded(true);
    setTimeout(() => setDownloaded(false), 3000);
  };



  const handleTranslate = async (targetLang) => {

    setIsTranslating(true);
    setTranslateError("");

    const langNames = {
      es: "Spanish",
      zh: "Mandarin Chinese",
      bn: "Bengali",
      fr: "French (Haitian Creole style where appropriate)",
      ru: "Russian",
      uk: "Ukrainian",
      ja: "Japanese",
      hi: "Hindi",
      ar: "Arabic",
    };
    const langName = langNames[targetLang] || targetLang;
    try {
      const response = await fetch("/api/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ report: editedReport || report, targetLang, langName }),
      });
      const data = await response.json();
      if (data.translated) {
        setTranslatedReport(data.translated);
      } else {
        setTranslateError(data.error || "Translation failed. Please try again.");

    } catch (err) {

                                const ta = document.createElement("textarea");

                        style={{ padding: "7px 14px", background: "white", color: "#3b0764", border: "2px solid #3b0764", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13 }}
                      >🗂 Open Google Docs</button>

                    💡 <strong>Two ways to get to Google Docs:</strong> Click <strong>Select &amp; Copy</strong> then paste into an existing doc — OR click <strong>Open Google Docs</strong> which copies the report automatically and opens a new doc. Just press <strong>⌘V / Ctrl+V</strong> to paste.
                  </div>

                  <div style={{ background: "#f5f5f5", padding: "20px" }}>

                      <div style={{ borderBottom: "2px solid #2dd4c8", paddingBottom: 14, marginBottom: 20 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#2dd4c8", letterSpacing: 2, fontFamily: "Arial, sans-serif", marginBottom: 4 }}>💬 GRADERELAY</div>
                        <div style={{ fontSize: 20, fontWeight: 700, color: "#3b0764", fontFamily: "Georgia, serif", marginBottom: 10 }}>{reportLabel}</div>
                        <div style={{ fontSize: 10, color: "#555", fontFamily: "Arial, sans-serif" }}>
                          <strong>Student:</strong> _______________ &nbsp;|&nbsp;

                          {cName ? <span><strong>Class:</strong> {cName} &nbsp;|&nbsp;</span> : ""}

                      </div>
                      <div style={{ fontFamily: "Georgia, serif", fontSize: 12, lineHeight: 1.85, color: "#1a1a1a" }}>
                        {(editedReport || report).split("\n").map((line, i) =>

                            ? <div key={i} style={{ height: 8 }} />

            {/* Tip box */}
            <div style={{ marginTop: 14, padding: 14, background: "#f0fdf4", borderRadius: 10, border: "1px solid #bbf7d0" }}>

                <strong>💬 Text</strong> — opens Messages app with report pre-filled.&nbsp;

        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.45)", fontSize: 12, marginTop: 20, fontFamily: "'Source Serif 4', serif", lineHeight: 2 }}>

  <!-- PWA Install Prompt -->
  <script>
    let deferredPrompt;
    const installBanner = document.createElement('div');
    installBanner.id = 'install-banner';
    installBanner.innerHTML = `
      <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#2d1b69,#4c1d95);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);font-family:sans-serif;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:24px;">💬</span>
          <div>
            <div style="font-weight:700;font-size:14px;">Install GradeRelay</div>
            <div style="font-size:12px;color:#94a3b8;">Add to your home screen for quick access</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button id="install-btn" style="background:linear-gradient(135deg,#2dd4c8,#06b6d4);color:white;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;">Install</button>
          <button id="dismiss-btn" style="background:transparent;color:#94a3b8;border:1px solid #334155;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;">Not now</button>
        </div>
      </div>`;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.body.appendChild(installBanner);
      document.getElementById('install-btn').addEventListener('click', async () => {
        installBanner.remove();
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
      });
      document.getElementById('dismiss-btn').addEventListener('click', () => {
        installBanner.remove();
      });
    });

    // iOS "Add to Home Screen" tip — shows once
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
    if (isIos && !isStandalone && !localStorage.getItem('iosTipDismissed')) {
      const iosBanner = document.createElement('div');
      iosBanner.innerHTML = `
        <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#2d1b69,#4c1d95);color:white;padding:14px 20px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);font-family:sans-serif;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <span style="font-weight:700;font-size:14px;">💬 Install GradeRelay on iPhone</span>
            <button onclick="this.closest('div').parentElement.remove();localStorage.setItem('iosTipDismissed','1')" style="background:transparent;border:none;color:#94a3b8;font-size:18px;cursor:pointer;line-height:1;">×</button>
          </div>
          <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.6;">Tap the <strong style="color:white;">Share button</strong> (□↑) at the bottom of Safari, then tap <strong style="color:white;">"Add to Home Screen"</strong> to install GradeRelay as an app.</p>
        </div>`;
      setTimeout(() => document.body.appendChild(iosBanner), 3000);
    }

    // Register Service Worker for offline use
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'graderelay-v1';
        const ASSETS = ['/'];
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
