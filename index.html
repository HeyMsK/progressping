  window.copyStyledReport = function(rType, tName, cName, pWord, termLabel, bodyText) {
    var html = window.buildStyledReport(rType, tName, cName, pWord, termLabel, bodyText);
    var plain = rType + '\nStudent: _______________________________\n' +
      (tName ? 'Teacher: ' + tName + '\n' : '') +
      (cName ? 'Class: ' + cName + '\n' : '') +
      (termLabel ? pWord + ': ' + termLabel + '\n' : '') +
      '\n' + bodyText;
    try {
      var item = new ClipboardItem({
        'text/html': new Blob([html], {type: 'text/html'}),
        'text/plain': new Blob([plain], {type: 'text/plain'})
      });
      navigator.clipboard.write([item]).catch(function() {
        navigator.clipboard.writeText(plain).catch(function() { forceCopy(plain); });
      });
    } catch(e) {
      navigator.clipboard.writeText(plain).catch(function() { forceCopy(plain); });
    }
    function forceCopy(txt) {
      var ta = document.createElement('textarea');
      ta.value = txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  };

  const isMarkingPeriod = reportFrequency === "marking_period";

  const getNames = () => {
    const tName = teacherName.trim() || "Your Teacher";
    const cName = className.trim() || "";
    const sName = nameBlank ? "your child, _______________" : "your child";
    const sNameFirst = nameBlank ? "Your child, _______________" : "Your child";
    const wOf = weekOf.trim() || new Date().toLocaleDateString();
    const termLabel = isMarkingPeriod
      ? (termType === "Custom" ? "" : termType + " " + (markingPeriodDate || ""))
      : wOf;
    return { tName, cName, sName, sNameFirst, wOf, termLabel, isDaily, isMarkingPeriod };
  };

  const generateReport = () => {
    const { tName, cName, sName, sNameFirst, wOf, termLabel } = getNames();
    const T = TRANSLATIONS["en"] || {};
    const schoolLine = schoolName.trim() ? schoolName.trim() : "";
    const lines = [];

    // ── Greeting ─────────────────────────────────────────
    lines.push(T.greeting || "Dear Parent/Guardian,");
    lines.push("");

    // ── Intro sentence ───────────────────────────────────
    const classRef = cName ? cName : "class";
    if (isMarkingPeriod) {
      lines.push(`I am writing to share ${sName}'s progress report for this marking period in ${classRef}. ${T.intro_tail || "We value your partnership in their education and want to keep you informed of their progress."}`);
    } else if (isDaily) {
      lines.push(`I wanted to take a moment to share how ${sName} is doing in ${classRef} today. ${T.intro_tail || "We value your partnership in their education and want to keep you informed of their progress."}`);
    } else {
      lines.push(`I wanted to share a quick update on how ${sName} is doing this week in ${classRef}. ${T.intro_tail || "We value your partnership in their education and want to keep you informed of their progress."}`);
    }
    lines.push("");

    // ── Subject-specific prompts (grouped naturally) ─────
    if (selectedSubjectPrompts.length > 0) {
      const subj = SUBJECT_PROMPTS[activeSubject];
      if (subj) {
        // Clean subject name — remove emoji prefix
        const subjName = activeSubject.replace(/^[^\s]+\s/, "");
        if (selectedSubjectPrompts.length === 1) {
          lines.push(`In ${subjName}, ${sName} ${selectedSubjectPrompts[0]}.`);
        } else {
          // First prompt starts the paragraph
          lines.push(`In ${subjName}, ${sName} ${selectedSubjectPrompts[0]}.`);
          // Subsequent prompts flow as new sentences
          for (let i = 1; i < selectedSubjectPrompts.length; i++) {
            const cap = sNameFirst.charAt(0).toUpperCase() + sNameFirst.slice(1);
            lines.push(`${cap} ${selectedSubjectPrompts[i]}.`);
          }
        }
        lines.push("");
      }
    }

    // ── General prompts (grouped by category) ────────────
    Object.entries(selectedPrompts).forEach(([cat, prompts]) => {
      if (prompts && prompts.length > 0) {
        prompts.forEach((p, idx) => {
          const cap = sNameFirst.charAt(0).toUpperCase() + sNameFirst.slice(1);
          lines.push(`${cap} ${p}.`);
        });
        lines.push("");
      }
    });

    // ── Grade estimate ───────────────────────────────────
    if (gradeEstimate) {
      const gradeMap = {
        "95-100": "95–100 (Excellent / Exceeding expectations)",
        "85-94": "85–94 (Very Good / Meeting expectations)",
        "75-84": "75–84 (Good / Approaching expectations)",
        "70-74": "70–74 (Borderline / Needs improvement)",
        "65-69": "65–69 (Below passing / At risk)",
        "below-65": "Below 65 (Failing / Urgent support needed)",
      };
      const grade = gradeEstimate === "custom" ? customGrade : (gradeMap[gradeEstimate] || gradeEstimate);
      lines.push(`Current grade estimate: ${grade}`);
      lines.push("");
    }

    // ── Personal note ────────────────────────────────────
    if (customNote.trim()) {
      lines.push(customNote.trim());
      lines.push("");
    }

    // ── Closing ──────────────────────────────────────────
    lines.push("Please don't hesitate to reach out if you have any questions or would like to schedule a time to connect. Thank you for your continued support.");
    lines.push("");
    lines.push(T.regards || "Warm regards,");
    lines.push(tName);
    if (cName) lines.push(cName);
    if (schoolLine) lines.push(schoolLine);
    if (studentGradeLevel) lines.push(`Student Grade: ${studentGradeLevel}`);
    if (termLabel) {
      const periodWord = isMarkingPeriod ? "Term" : isDaily ? "Date" : "Week of";
      lines.push(`${periodWord}: ${termLabel}`);
    }

    return lines.join("\n");
  };

    const blob = new Blob([docHtml], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "GradeRelay-Progress-Report.doc";
    a.click();
    URL.revokeObjectURL(url);
    setDownloaded(true);
    setTimeout(() => setDownloaded(false), 2000);

    const handleTranslate = async (lang) => {
    const text = editedReport || generateReport();
    const langName = LANGUAGES[lang]?.label || lang;
    setIsTranslating(true);
    setTranslateLang(lang);
    setTranslatedReport("");
    setTranslateError("");
    try {
      const res = await fetch("/api/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ report: text, targetLang: lang, langName }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        setTranslateError(errData.error || "Translation service error (" + res.status + "). Make sure the app is deployed to graderelay.com.");
        setIsTranslating(false);
        return;
      }
      const data = await res.json();
      if (data.translated || data.translation) {
        const translatedBody = data.translated || data.translation;
        const { tName, cName, termLabel } = getNames();
        const rType = isMarkingPeriod ? "Marking Period Progress Report" : isDaily ? "Daily Progress Update" : "Weekly Progress Report";

        if (termLabel) header += pWord + ": " + termLabel + "\n";
        header += divider + "\n\n";
        setTranslatedReport(header + translatedBody);
      } else {
        setTranslateError(data.error || "Translation failed. Please try again.");
      }
    } catch (err) {
      if (err.message && err.message.includes("fetch")) {
        setTranslateError("Translation requires the live site at graderelay.com — it won’t work when opening the file locally.");

        setTranslateError("Translation failed: " + err.message);
      }
    }

            <label style={{ fontSize: 12, fontWeight: 700, color: "#6b7280", display: "block", marginBottom: 8 }}>EDIT YOUR REPORT</label>
            <textarea value={editedReport} onChange={e => setEditedReport(e.target.value)}
              style={{ width: "100%", minHeight: 280, padding: 16, fontSize: 14, lineHeight: 1.8,
                color: "#1f2937", whiteSpace: "pre-wrap", fontFamily: "'Source Serif 4', serif",
                border: "2px solid #e5e7eb", borderRadius: 10, resize: "vertical", boxSizing: "border-box" }} />
            <button onClick={() => setEditedReport(generateReport())}
              style={{ marginTop: 8, fontSize: 12, color: "#9ca3af", background: "none", border: "none", cursor: "pointer" }}>
              Reset to original
            </button>
          </div>
        </div>

        {/* Export Buttons */}
        <div className="card">
          <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, color: "#1f2937", margin: "0 0 14px 0" }}>Export &amp; Share</h3>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button className="export-btn" style={{ background: copied ? "#d1fae5" : "#ede9fe", color: copied ? "#065f46" : "#4c1d95" }}
              onClick={handleCopy}>{copied ? "✓ Copied!" : "📋 Copy"}</button>
            <button className="export-btn" style={{ background: "#fef3c7", color: "#92400e" }}
              onClick={() => setExportPanel(exportPanel === "email" ? null : "email")}>✉️ Email</button>
            <button className="export-btn" style={{ background: "#d1fae5", color: "#065f46" }}
              onClick={() => setExportPanel(exportPanel === "sms" ? null : "sms")}>💬 Text</button>
            <button className="export-btn" style={{ background: "#dbeafe", color: "#1e40af" }}
              onClick={handleDownloadDoc}>{downloaded ? "✓ Downloaded!" : "⬇️ Download .doc"}</button>
            <button className="export-btn" style={{ background: "#f0fdf4", color: "#166534" }}
              onClick={() => {
                const g = editedReport || generateReport();
                const { tName: tG, cName: cG, termLabel: tlG } = getNames();
                const rTypeG = isMarkingPeriod ? "Marking Period Progress Report" : isDaily ? "Daily Progress Update" : "Weekly Progress Report";
                const pWordG = isMarkingPeriod ? "Term" : isDaily ? "Date" : "Week of";
                window.copyStyledReport(rTypeG, tG, cG, pWordG, tlG, g);
                setShowToast(true);
                setTimeout(() => { setShowToast(false); window.open("https://docs.new", "_blank"); }, 4000);
              }}>🗂 Google Docs</button>
            <button className="export-btn" style={{ background: "#f5f3ff", color: "#4c1d95" }}
              onClick={() => setExportPanel(exportPanel === "translate" ? null : "translate")}>🌐 Translate</button>
          </div>

          {/* Email Panel */}
          {exportPanel === "email" && (
            <div style={{ marginTop: 14, padding: 18, background: "#f5f3ff", borderRadius: 10 }}>
              <p style={{ margin: "0 0 10px 0", fontWeight: 700, fontSize: 14, color: "#4c1d95" }}>✉️ Send via Email</p>
              <a href={`mailto:?subject=Progress Report&body=${encodeURIComponent(report)}`}
                style={{ display: "inline-block", padding: "10px 20px", background: "linear-gradient(135deg,#4c1d95,#7c3aed)",
                  color: "white", borderRadius: 8, textDecoration: "none", fontWeight: 700, fontSize: 14 }}>
                Open Email App
              </a>
            </div>
          )}

          {/* SMS Panel */}
          {exportPanel === "sms" && (
            <div style={{ marginTop: 14, padding: 18, background: "#f0fdf4", borderRadius: 10 }}>
              <p style={{ margin: "0 0 10px 0", fontWeight: 700, fontSize: 14, color: "#065f46" }}>💬 Send via Text</p>
              <a href={`sms:?body=${encodeURIComponent(report)}`}
                style={{ display: "inline-block", padding: "10px 20px", background: "linear-gradient(135deg,#059669,#047857)",
                  color: "white", borderRadius: 8, textDecoration: "none", fontWeight: 700, fontSize: 14 }}>
                Open Messages
              </a>
              <p style={{ margin: "10px 0 0 0", fontSize: 12, color: "#6b7280" }}>Note: Long reports may be trimmed by your carrier.</p>
            </div>
          )}

          {/* Translate Panel */}
          {exportPanel === "translate" && (
            <div style={{ marginTop: 14, padding: 18, background: "#f0fdfa", borderRadius: 10 }}>
              <p style={{ margin: "0 0 12px 0", fontWeight: 700, fontSize: 14, color: "#0e7490" }}>🌐 Translate Report</p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
                {Object.entries(LANGUAGES).map(([code, lang]) => code !== "en" && (
                  <button key={code} onClick={() => handleTranslate(code)}
                    style={{ padding: "8px 14px", borderRadius: 8, border: "2px solid",
                      borderColor: translateLang === code ? "#0e7490" : "#e5e7eb",
                      background: translateLang === code ? "#e0f7fa" : "white",
                      color: translateLang === code ? "#0e7490" : "#374151",
                      fontFamily: "'Source Serif 4', serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                    {lang.flag} {lang.label}
                  </button>
                ))}
              </div>
              {isTranslating && <p style={{ color: "#0e7490", fontSize: 14 }}>⏳ Translating...</p>}
              {translateError && <p style={{ color: "#b91c1c", fontSize: 13 }}>{translateError}</p>}
              {translatedReport && (
                <div>
                  <textarea value={translatedReport} onChange={e => setTranslatedReport(e.target.value)}
                    style={{ width: "100%", minHeight: 200, padding: 14, fontSize: 13, lineHeight: 1.7,
                      border: "1px solid #99f6e4", borderRadius: 8, resize: "vertical", fontFamily: "'Source Serif 4', serif" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    <button onClick={() => {
                        const ta = document.createElement("textarea");
                        ta.value = translatedReport;
                        ta.style.position = "fixed";
                        ta.style.top = "0";
                        ta.style.left = "0";
                        ta.style.opacity = "0";
                        document.body.appendChild(ta);
                        ta.focus();
                        ta.select();
                        try { document.execCommand("copy"); } catch(e) {}
                        document.body.removeChild(ta);
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                      }}
                      style={{ padding: "8px 16px", background: copied ? "#065f46" : "#7c3aed", color: "white", border: "none", borderRadius: 8, fontWeight: 700, cursor: "pointer", fontSize: 13 }}>
                      {copied ? "✓ Copied!" : "📋 Copy Translated"}
                    </button>
                    <a href={`mailto:?body=${encodeURIComponent(translatedReport)}`}
                      style={{ padding: "8px 16px", background: "#6d28d9", color: "white", borderRadius: 8, fontWeight: 700, fontSize: 13, textDecoration: "none" }}>
                      ✉️ Email
                    </a>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.45)", fontSize: 12, paddingBottom: 24 }}>
          GradeRelay · Connecting Teachers &amp; Families · {new Date().getFullYear()}
        </p>
      </div>
    </div>
  );
}


// ── Paywall Modal ──────────────────────────────────────
function PaywallModal({ onClose, foundingCount }) {
  const [loading, setLoading] = React.useState(null);
  const showFounding = foundingCount < window.GR_FOUNDING_MAX;

  const checkout = async (priceKey) => {
    setLoading(priceKey);
    const supa = window.supabase.createClient(window.GR_SUPA_URL, window.GR_SUPA_KEY);
    const { data: { user } } = await supa.auth.getUser();
    if (!user) { setLoading(null); return; }
    try {
      const res = await fetch('/api/stripe-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ priceId: priceKey, userId: user.id, email: user.email })
      });
      const data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else { alert('Checkout error. Please try again.'); }
    } catch(e) { alert('Network error. Please try again.'); }
    setLoading(null);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 99999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "white", borderRadius: 20, maxWidth: 480, width: "100%", overflow: "hidden", boxShadow: "0 24px 80px rgba(0,0,0,0.5)" }}>
        <div style={{ background: "linear-gradient(135deg,#3b0764,#4c1d95,#7c3aed)", padding: "24px 28px", textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📊</div>
          <h2 style={{ color: "white", fontFamily: "'Playfair Display', serif", fontSize: 22, margin: 0 }}>You've used your 5 free reports</h2>
          <p style={{ color: "rgba(255,255,255,0.8)", fontSize: 14, margin: "8px 0 0" }}>Upgrade for unlimited reports</p>
        </div>
        <div style={{ padding: "24px 28px" }}>
          {showFounding && (
            <div style={{ marginBottom: 12, padding: 16, background: "#fdf4ff", border: "2px solid #7c3aed", borderRadius: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <span style={{ fontWeight: 700, fontSize: 15, color: "#4c1d95", fontFamily: "'Playfair Display', serif" }}>💜 Founding Member</span>
                <span style={{ background: "#7c3aed", color: "white", fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 999 }}>FIRST {window.GR_FOUNDING_MAX} ONLY</span>
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: "#4c1d95", marginBottom: 4 }}>$44.95 <span style={{ fontSize: 13, fontWeight: 400 }}>one-time · lifetime</span></div>
              <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Unlimited reports · all future features · locked forever at this price</div>
              <button onClick={() => checkout(window.GR_PRICE_FOUNDING)} disabled={loading === window.GR_PRICE_FOUNDING}
                style={{ width: "100%", padding: "12px", background: "linear-gradient(135deg,#4c1d95,#7c3aed)", color: "white", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "'Source Serif 4', serif" }}>
                {loading === window.GR_PRICE_FOUNDING ? "Loading..." : "Get Lifetime Access — $44.95"}
              </button>
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
            {[
              { label: "Pro Monthly", price: "$5.99/mo", desc: "Cancel anytime", priceId: window.GR_PRICE_MONTHLY, color: "#1e40af", bg: "#eff6ff" },
              { label: "Pro Annual", price: "$49/yr", desc: "Save $22.88", priceId: window.GR_PRICE_ANNUAL, color: "#065f46", bg: "#f0fdf4" },
            ].map(plan => (
              <div key={plan.label} style={{ padding: 14, background: plan.bg, borderRadius: 10, border: `1.5px solid ${plan.color}30` }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: plan.color, marginBottom: 4 }}>{plan.label}</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: plan.color }}>{plan.price}</div>
                <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 10 }}>{plan.desc}</div>
                <button onClick={() => checkout(plan.priceId)} disabled={loading === plan.priceId}
                  style={{ width: "100%", padding: "8px", background: plan.color, color: "white", border: "none", borderRadius: 6, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                  {loading === plan.priceId ? "..." : "Subscribe"}
                </button>
              </div>
            ))}
          </div>
          <button onClick={onClose} style={{ width: "100%", padding: "10px", background: "none", border: "1px solid #e5e7eb", borderRadius: 8, color: "#6b7280", fontSize: 13, cursor: "pointer" }}>
            Continue with free (5 reports/month)
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Auth Wrapper ───────────────────────────────────────
function AuthWrapper() {
  const [authStep, setAuthStep] = React.useState("loading");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [authError, setAuthError] = React.useState("");
  const [authLoading, setAuthLoading] = React.useState(false);
  const [user, setUser] = React.useState(null);
  const [profile, setProfile] = React.useState(null);
  const [showPaywall, setShowPaywall] = React.useState(false);
  const [foundingCount, setFoundingCount] = React.useState(0);

  const supa = React.useMemo(() => {
    if (window.supabase && window.GR_SUPA_URL) {
      return window.supabase.createClient(window.GR_SUPA_URL, window.GR_SUPA_KEY);
    }
    return null;
  }, []);

  const loadProfile = React.useCallback(async (uid) => {
    if (!supa) return;
    const { data } = await supa.from('profiles').select('*').eq('id', uid).single();
    if (data) setProfile(data);
    // Get founding count
    const { count } = await supa.from('profiles').select('*', { count: 'exact', head: true }).eq('plan', 'founding');
    setFoundingCount(count || 0);
  }, [supa]);

  React.useEffect(() => {
    if (!supa) { setAuthStep("app"); return; }
    supa.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        loadProfile(session.user.id);
        setAuthStep("app");
      } else {
        setAuthStep("login");
      }
    });
    const { data: { subscription } } = supa.auth.onAuthStateChange((_event, session) => {
      if (session?.user) {
        setUser(session.user);
        loadProfile(session.user.id);
        setAuthStep("app");
      } else {
        setUser(null);
        setProfile(null);
        setAuthStep("login");
      }
    });
    return () => subscription.unsubscribe();
  }, [supa, loadProfile]);

  const handleSignup = async () => {
    setAuthError(""); setAuthLoading(true);
    const { error } = await supa.auth.signUp({ email, password,
      options: { data: { plan: 'free', reports_this_month: 0 } }
    });
    if (error) setAuthError(error.message);
    else {
      // Create profile row
      const { data: { user: u } } = await supa.auth.getUser();
      if (u) await supa.from('profiles').upsert({ id: u.id, email: u.email, plan: 'free', reports_this_month: 0, reports_total: 0 });
      setAuthError("✅ Check your email to confirm your account, then sign in.");
    }
    setAuthLoading(false);
  };

  const handleLogin = async () => {
    setAuthError(""); setAuthLoading(true);
    const { error } = await supa.auth.signInWithPassword({ email, password });
    if (error) setAuthError(error.message);
    setAuthLoading(false);
  };

  const handleSignout = async () => {
    if (supa) await supa.auth.signOut();
  };

  const incrementReport = async () => {
    if (!supa || !user || !profile) return true;
    const plan = profile.plan || 'free';
    if (plan === 'pro' || plan === 'founding') return true;
    const used = profile.reports_this_month || 0;
    if (used >= window.GR_FREE_LIMIT) {
      setShowPaywall(true);
      return false;
    }
    await supa.from('profiles').update({
      reports_this_month: used + 1,
      reports_total: (profile.reports_total || 0) + 1
    }).eq('id', user.id);
    setProfile(p => ({ ...p, reports_this_month: used + 1 }));
    return true;
  };

  if (authStep === "loading") {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: "white", fontSize: 18, fontFamily: "'Source Serif 4', serif" }}>Loading...</div>
      </div>
    );
  }

  if (authStep === "login" || authStep === "signup") {
    const isSignup = authStep === "signup";
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "rgba(255,255,255,0.97)", borderRadius: 20, padding: "40px 32px", maxWidth: 400, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <img src="https://raw.githubusercontent.com/HeyMsK/graderelay/main/textbubbleedit.png" alt="GradeRelay" style={{ width: 72, height: 72, borderRadius: 16, marginBottom: 8 }} />
            <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, color: "#1e1b4b", margin: 0 }}>GradeRelay</h1>
            <p style={{ color: "#6b7280", fontSize: 14, marginTop: 6 }}>Connecting Teachers &amp; Families</p>
          </div>
          <div style={{ display: "flex", marginBottom: 20, borderRadius: 8, overflow: "hidden", border: "2px solid #e5e7eb" }}>
            {["login", "signup"].map(tab => (
              <button key={tab} onClick={() => { setAuthStep(tab); setAuthError(""); }}
                style={{ flex: 1, padding: "10px", border: "none", cursor: "pointer", fontFamily: "'Source Serif 4', serif", fontWeight: 700, fontSize: 14,
                  background: authStep === tab ? "#4c1d95" : "white", color: authStep === tab ? "white" : "#6b7280" }}>
                {tab === "login" ? "Sign In" : "Sign Up"}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="Email address"
              style={{ padding: "12px 16px", border: "2px solid #e5e7eb", borderRadius: 8, fontSize: 15, fontFamily: "'Source Serif 4', serif", outline: "none", color: "#1f2937" }} />
            <input value={password} onChange={e => setPassword(e.target.value)} type="password" placeholder="Password"
              onKeyDown={e => e.key === "Enter" && (isSignup ? handleSignup() : handleLogin())}
              style={{ padding: "12px 16px", border: "2px solid #e5e7eb", borderRadius: 8, fontSize: 15, fontFamily: "'Source Serif 4', serif", outline: "none", color: "#1f2937" }} />
            {authError && <p style={{ color: authError.startsWith("✅") ? "#065f46" : "#b91c1c", fontSize: 13, margin: 0 }}>{authError}</p>}
            <button onClick={isSignup ? handleSignup : handleLogin} disabled={authLoading}
              style={{ padding: "14px", background: "linear-gradient(135deg,#3b0764,#4c1d95,#7c3aed)", color: "white", border: "none", borderRadius: 10, fontSize: 16, fontFamily: "'Source Serif 4', serif", fontWeight: 700, cursor: "pointer" }}>
              {authLoading ? "Please wait..." : (isSignup ? "Create Account" : "Sign In")}
            </button>
          </div>
          {isSignup && <p style={{ fontSize: 12, color: "#9ca3af", textAlign: "center", marginTop: 16 }}>Free plan: 5 reports/month. No credit card required.</p>}
          <p style={{ textAlign: "center", fontSize: 12, color: "#9ca3af", marginTop: 16 }}>🔒 FERPA compliant · No student names stored</p>
        </div>
      </div>

    );
  }

  const plan = profile?.plan || 'free';
  const used = profile?.reports_this_month || 0;
  const isPro = plan === 'pro' || plan === 'founding';
  const remaining = isPro ? "∞" : Math.max(0, window.GR_FREE_LIMIT - used);

  return (
    <div>
      {showPaywall && <PaywallModal onClose={() => setShowPaywall(false)} foundingCount={foundingCount} />}
      {/* Top bar */}
      <div style={{ position: "fixed", top: 4, right: 12, zIndex: 1000, display: "flex", alignItems: "center", gap: 8 }}>
        {!isPro && (
          <span style={{ background: "rgba(255,255,255,0.9)", borderRadius: 999, padding: "4px 12px", fontSize: 12, color: "#4c1d95", fontWeight: 700, fontFamily: "'Source Serif 4', serif" }}>
            {remaining} free {remaining === 1 ? "report" : "reports"} left
          </span>
        )}
        {isPro && (
          <span style={{ background: "linear-gradient(135deg,#4c1d95,#7c3aed)", borderRadius: 999, padding: "4px 12px", fontSize: 12, color: "white", fontWeight: 700 }}>
            {plan === 'founding' ? "💜 Founding Member" : "⭐ Pro"}
          </span>
        )}
        {!isPro && (
          <button onClick={() => setShowPaywall(true)}
            style={{ background: "linear-gradient(135deg,#4c1d95,#7c3aed)", color: "white", border: "none", borderRadius: 999, padding: "4px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            Upgrade
          </button>
        )}
        <button onClick={handleSignout}
          style={{ background: "rgba(255,255,255,0.2)", color: "white", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 999, padding: "4px 12px", fontSize: 11, cursor: "pointer" }}>
          Sign Out
        </button>
      </div>
      <App onGenerateReport={incrementReport} />
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(AuthWrapper));
</script>
</body>
</html>
